    function luminance(hex) {
      const rgb = hexToRgb(hex);
      const [r, g, b] = [rgb.r, rgb.g, rgb.b].map(v => {
        v /= 255;
        return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
      });
      return 0.2126 * r + 0.7152 * g + 0.0722 * b;
    }

    function hexToRgb(hex) {
      const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return result ? {
        r: parseInt(result[1], 16),
        g: parseInt(result[2], 16),
        b: parseInt(result[3], 16)
      } : { r: 0, g: 0, b: 0 };
    }

    function contrastColor(hex) {
      return luminance(hex) > 0.179 ? '#0f172a' : '#ffffff';
    }

    function adjustColor(hex, factor) {
      const rgb = hexToRgb(hex);
      return '#' + [rgb.r, rgb.g, rgb.b].map(v => {
        const adj = Math.round(Math.min(255, Math.max(0, v * factor)));
        return adj.toString(16).padStart(2, '0');
      }).join('');
    }

    function applyTheme(config) {
      themeConfig = { ...themeConfig, ...config };
      const lum = luminance(themeConfig.bg);
      themeConfig.text = lum > 0.179 ? '#0f172a' : '#ffffff';
      themeConfig.subtext = lum > 0.179 ? '#475569' : '#94a3b8';
      themeConfig.border = lum > 0.179
        ? adjustColor(themeConfig.bg, 0.85)
        : adjustColor(themeConfig.bg, 2.0);
      themeConfig.surface = lum > 0.179
        ? adjustColor(themeConfig.bg, 0.93)
        : adjustColor(themeConfig.bg, 1.4);
      themeConfig.card = lum > 0.179
        ? adjustColor(themeConfig.bg, 0.96)
        : adjustColor(themeConfig.bg, 1.6);
      themeConfig.input = lum > 0.179
        ? adjustColor(themeConfig.bg, 0.9)
        : adjustColor(themeConfig.bg, 1.5);

      const root = document.documentElement;
      root.style.setProperty('--bg', themeConfig.bg);
      root.style.setProperty('--surface', themeConfig.surface);
      root.style.setProperty('--text', themeConfig.text);

    }

    async function seedSongsIfNeeded() {
      const songsRef = collection(db, 'songs');
      const snap = await getDocs(query(songsRef, where('seeded', '==', true)));
      if (snap.size >= 4) return;
      const batch = writeBatch(db);
      for (const song of SEED_SONGS) {
        const existing = snap.docs.find(d => d.data().title === song.title);
        if (!existing) {
          const ref = doc(songsRef);
          batch.set(ref, {
            ...song,
            createdBy: ADMIN_EMAIL,
            createdByName: 'Admin',
            createdByPhoto: '',
            createdAt: serverTimestamp(),
            updatedAt: serverTimestamp()
          });
        }
      }
      await batch.commit();
    }

    // ─── Role Helpers ──────────────────────────────────────────────────────────
    function isAdmin(profile) {
      return profile && profile.email === ADMIN_EMAIL;
    }
    function isSubAdmin(profile) {
      return profile && profile.role === 'subadmin';
    }
    function isLead(profile) {
      return profile && profile.role === 'lead';
    }
    function isTech(profile) {
      return profile && profile.role === 'tech';
    }
    function isSinger(profile) {
      return profile && profile.role === 'singer';
    }
    function isMusician(profile) {
      return profile && (profile.role === 'musician' || (profile.instruments && profile.instruments.length > 0 && !isTech(profile) && !isSinger(profile)));
    }
    function canManageUsers(profile) {
      return isAdmin(profile) || isSubAdmin(profile) || isLead(profile);
    }
    function canCreateSong(profile) {
      return isAdmin(profile) || isSubAdmin(profile) || isLead(profile)
        || (profile && profile.canAddSongs);
    }
    function canDeleteSong(profile) {
      return isAdmin(profile) || isSubAdmin(profile)
        || (profile && profile.canDeleteSongs);
    }
    function getSetlistLimit(profile) {
      if (!profile) return 0;
      if (isAdmin(profile)) return Infinity;
      if (profile.setlistLimit !== undefined) return profile.setlistLimit;
      if (isSubAdmin(profile) || isLead(profile)) return 5;
      return 2;
    }
    function getSongLimit(settings) {
      return (settings && settings.songCap) ? settings.songCap : 4;
    }
    function lyricsOnly(profile) {
      return isSinger(profile) || isTech(profile);
    }
    function canSeeCustomGroup(profile, setlist) {
      if (!profile || !setlist) return false;
      if (isAdmin(profile)) return true;
      if (isSubAdmin(profile) || isLead(profile)) return true;
      if (isTech(profile)) return true;
      if (setlist.createdBy === profile.uid) return true;
      if (setlist.whitelist && setlist.whitelist.includes(profile.uid)) return true;
      return false;
    }

    // ─── Chord Transposition ───────────────────────────────────────────────────
    function transposeChord(chord, steps) {
      if (steps === 0) return chord;
      return chord.replace(/[A-G]#?b?/g, match => {
        let normalized = match.replace('Db','C#').replace('Eb','D#').replace('Fb','E')
          .replace('Gb','F#').replace('Ab','G#').replace('Bb','A#').replace('Cb','B');
        let idx = KEYS.indexOf(normalized);
        if (idx === -1) return match;
        return KEYS[(idx + steps + 12) % 12];
      });
    }

    function getCapoSuggestion(originalKey, targetKey) {
      const oIdx = KEYS.indexOf(originalKey);
      const tIdx = KEYS.indexOf(targetKey);
      if (oIdx === -1 || tIdx === -1) return null;
      const diff = (tIdx - oIdx + 12) % 12;
      if (diff === 0) return null;
      const capo = (12 - diff) % 12;
      if (capo === 0) return null;
      return `Capo ${capo} (Play in ${originalKey} shapes)`;
    }

    // ─── Chord Sheet Parser ────────────────────────────────────────────────────
    function parseChordSheet(content, transposeSteps, showLyricsOnly) {
      if (!content) return '<p class="opacity-50 italic">No content available.</p>';
      const lines = content.split('\n');
      let html = '';
      const sectionPattern = /^\[(Verse|Chorus|Pre-Chorus|Bridge|Intro|Outro|Tag|Interlude)[^\]]*\]/i;
      const chordLinePattern = /^([A-G][#b]?(maj|min|m|sus|add|dim|aug|7|9|11|13|M)?[0-9]?\/[A-G][#b]?|[A-G][#b]?(maj|min|m|sus|add|dim|aug|7|9|11|13|M)?[0-9]?)(\s+([A-G][#b]?(maj|min|m|sus|add|dim|aug|7|9|11|13|M)?[0-9]?\/[A-G][#b]?|[A-G][#b]?(maj|min|m|sus|add|dim|aug|7|9|11|13|M)?[0-9]?))*\s*$/;

      let pendingChordLine = '';

      function flushPendingChord() {
        if (pendingChordLine && !showLyricsOnly) {
          html += `<div class="chord-line font-mono text-sm leading-tight mb-0" style="color:var(--chord);white-space:pre;">${escapeHtml(pendingChordLine)}</div>`;
          pendingChordLine = '';
        } else {
          pendingChordLine = '';
        }
      }

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        const trimmed = line.trim();

        if (sectionPattern.test(trimmed)) {
          flushPendingChord();
          html += `<div class="section-marker text-xs font-bold uppercase tracking-widest mt-5 mb-1 px-2 py-0.5 rounded inline-block" style="background:var(--primary);color:var(--primary-text);">${escapeHtml(trimmed.replace(/[\[\]]/g,''))}</div>`;
          continue;
        }

        if (trimmed === '') {
          flushPendingChord();
          html += `<div class="mb-3"></div>`;
          continue;
        }

        // Detect if this is a chord-only line
        const transposedLine = transposeSteps !== 0
          ? transposeChord(trimmed, transposeSteps)
          : trimmed;

        if (chordLinePattern.test(trimmed.split(' ').filter(Boolean)[0] || '')) {
          // It's a chord line
          flushPendingChord();
          pendingChordLine = transposedLine;
        } else {
          // It's a lyric line — flush any pending chord above it
          if (pendingChordLine && !showLyricsOnly) {
            html += `<div class="chord-line font-mono text-sm leading-tight mb-0" style="color:var(--chord);white-space:pre;">${escapeHtml(pendingChordLine)}</div>`;
            pendingChordLine = '';
          } else {
            pendingChordLine = '';
          }
          html += `<div class="lyric-line leading-relaxed mb-1" style="color:var(--text);white-space:pre-wrap;">${escapeHtml(trimmed)}</div>`;
        }
      }
      flushPendingChord();
      return html;
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ─── Auth State Observer ───────────────────────────────────────────────────
    onAuthStateChanged(auth, async user => {
      if (user) {
        currentUser = user;
        await loadOrCreateProfile(user);
        await seedSongsIfNeeded();
        subscribeToSettings();
        hideAuthView();
        if (!userProfile.role && !userProfile.onboardingComplete) {
          showOnboarding();
        } else {
          initMainApp();
        }
      } else {
        currentUser = null;
        userProfile = null;
        unsubscribeAll();
        showAuthView();
      }
    });

    async function loadOrCreateProfile(user) {
      const ref = doc(db, 'users', user.uid);
      const snap = await getDoc(ref);
      if (snap.exists()) {
        userProfile = { uid: user.uid, ...snap.data() };
        if (user.email === ADMIN_EMAIL && userProfile.role !== 'admin') {
          await updateDoc(ref, { role: 'admin', email: user.email });
          userProfile.role = 'admin';
        }
      } else {
        const newProfile = {
          uid: user.uid,
          email: user.email,
          displayName: user.displayName || 'User',
          photoURL: user.photoURL || '',
          role: user.email === ADMIN_EMAIL ? 'admin' : '',
          instruments: [],
          canSing: false,
          isTechAlso: false,
          onboardingComplete: user.email === ADMIN_EMAIL,
          showTutorial: true,
          setlistLimit: user.email === ADMIN_EMAIL ? null : undefined,
          createdAt: serverTimestamp()
        };
        await setDoc(ref, newProfile);
        userProfile = { ...newProfile };
      }
    }

    function subscribeToSettings() {
      if (settingsUnsubscribe) settingsUnsubscribe();
      settingsUnsubscribe = onSnapshot(doc(db, 'settings', 'app'), snap => {
        if (snap.exists()) {
          const data = snap.data();
          appSettings = { ...appSettings, ...data };
          if (data.appName) {
            document.title = data.appName;
            document.querySelectorAll('.app-name-label').forEach(el => el.textContent = data.appName);
          }
          if (data.logoUrl) {
            document.querySelectorAll('.app-logo-img').forEach(el => { el.src = data.logoUrl; el.style.display=''; });
          }
          if (data.theme) applyTheme(data.theme);
        }
      });
    }

    function unsubscribeAll() {
      if (songsUnsubscribe) songsUnsubscribe();
      if (setlistsUnsubscribe) setlistsUnsubscribe();
      if (usersUnsubscribe) usersUnsubscribe();
      if (settingsUnsubscribe) settingsUnsubscribe();
    }

                <label class="flex items-center gap-3 p-3 rounded-xl cursor-pointer border" style="border-color:var(--border);background:var(--input);">
                  <input type="checkbox" id="canSingToggle" onchange="onboardingState.canSing=this.checked" class="w-4 h-4 accent-purple-500" />
                  <iconify-icon icon="mdi:microphone" width="20" style="color:var(--subtext);"></iconify-icon>
                  <span class="text-sm" style="color:var(--text);">Can you also sing?</span>
                </label>
                <label class="flex items-center gap-3 p-3 rounded-xl cursor-pointer border" style="border-color:var(--border);background:var(--input);">
                  <input type="checkbox" id="isTechAlsoToggle" onchange="onboardingState.isTechAlso=this.checked" class="w-4 h-4 accent-purple-500" />
                  <iconify-icon icon="mdi:headphones" width="20" style="color:var(--subtext);"></iconify-icon>
                  <span class="text-sm" style="color:var(--text);">Are you part of the Tech Team too?</span>
                </label>
              </div>
            </div>
            <button onclick="completeOnboarding()"
              class="w-full py-3 rounded-xl font-bold text-sm transition-all" id="onboardingSubmitBtn"
              style="background:var(--primary);color:var(--primary-text);">
              Complete Setup
            </button>
          </div>
        </div>`;
    }

    window.selectOnboardingRole = function(role) {
      onboardingState.role = role;
      document.querySelectorAll('.role-btn').forEach(btn => {
        btn.style.borderColor = 'var(--border)';
        btn.style.background = 'var(--input)';
      });
      const selected = document.getElementById('roleBtn' + role);
      if (selected) {
        selected.style.borderColor = 'var(--primary)';
        selected.style.background = 'var(--surface)';
      }
      document.getElementById('musicianSubStep').classList.toggle('hidden', role !== 'Musician');
    };

    window.toggleInstrument = function(inst) {
      if (onboardingState.instruments.includes(inst)) {
        onboardingState.instruments = onboardingState.instruments.filter(i => i !== inst);
      } else {
        onboardingState.instruments.push(inst);
      }
    };

    window.completeOnboarding = async function() {
      if (!onboardingState.role) { showToast('Please select a role', 'warning'); return; }
      if (onboardingState.role === 'Musician' && onboardingState.instruments.length === 0) {
        showToast('Please select at least one instrument', 'warning'); return;
      }
      const roleMap = { Musician: 'musician', Singer: 'singer', Tech: 'tech' };
      const profile = {
        role: roleMap[onboardingState.role],
        instruments: onboardingState.instruments,
        canSing: onboardingState.canSing,
        isTechAlso: onboardingState.isTechAlso,
        onboardingComplete: true
      };
      await updateDoc(doc(db, 'users', currentUser.uid), profile);
      userProfile = { ...userProfile, ...profile };
      document.getElementById('onboardingView').classList.add('hidden');
      initMainApp();
    };

    // ─── Main App Init ─────────────────────────────────────────────────────────
    function initMainApp() {
      document.getElementById('mainApp').classList.remove('hidden');
      renderTopBar();
      renderBottomNav();
      subscribeToSongs();
      subscribeToSetlists();
      if (canManageUsers(userProfile)) subscribeToUsers();
      applyTheme(themeConfig);
      showView('songs');
    }

    // ─── Top Bar ───────────────────────────────────────────────────────────────
    function renderTopBar() {
      const tb = document.getElementById('topBar');
      const photo = userProfile?.photoURL || '';
      const adminControls = isAdmin(userProfile) ? `
        <button onclick="showView('theme')" title="Theme" class="p-2 rounded-lg transition-all hover:opacity-80" style="background:var(--surface);">
          <iconify-icon icon="mdi:palette" width="20" style="color:var(--subtext);"></iconify-icon>
        </button>
        <button onclick="showView('roles')" title="Roles" class="p-2 rounded-lg transition-all hover:opacity-80" style="background:var(--surface);">
          <iconify-icon icon="mdi:shield-crown" width="20" style="color:var(--subtext);"></iconify-icon>
        </button>` : '';
      tb.innerHTML = `
        <div class="flex items-center gap-3">
          <button onclick="showView('profile')" class="w-9 h-9 rounded-full overflow-hidden border-2 flex-shrink-0 hover:opacity-90 transition-all" style="border-color:var(--primary);">
            ${photo
              ? `<img src="${photo}" class="w-full h-full object-cover" alt="Profile" />`
              : `<div class="w-full h-full flex items-center justify-center text-white text-sm font-bold" style="background:var(--primary);">${(userProfile?.displayName||'U')[0]}</div>`}
          </button>
          <button onclick="goHome()" class="font-bold text-lg tracking-tight app-name-label" style="color:var(--text);">${appSettings.appName || 'GigBook'}</button>
        </div>
        <div class="flex items-center gap-2">
          <div id="homeBtn" class="hidden">
            <button onclick="goHome()" class="p-2 rounded-lg transition-all hover:opacity-80" style="background:var(--surface);" title="Home">
              <iconify-icon icon="mdi:home" width="20" style="color:var(--subtext);"></iconify-icon>
            </button>
          </div>
          ${adminControls}
          <button onclick="signOutUser()" class="p-2 rounded-lg transition-all hover:opacity-80" style="background:var(--surface);" title="Sign Out">
            <iconify-icon icon="mdi:logout" width="20" style="color:var(--subtext);"></iconify-icon>
          </button>
        </div>`;
    }

    window.goHome = function() {
      activeSong = null;
      activeSetlist = null;
      localTransposeSteps = 0;
      lyricsOnlyMode = false;
      stopAutoScroll();
      showView('songs');
      document.getElementById('homeBtn').classList.add('hidden');
    };

    // ─── Bottom Nav ────────────────────────────────────────────────────────────
    function renderBottomNav() {
      const nav = document.getElementById('bottomNav');
      const showUsers = canManageUsers(userProfile);
      nav.innerHTML = `
        <div class="flex" style="background:var(--surface);border-top:1px solid var(--border);">
          <button onclick="showView('songs')" id="navSongs" class="nav-tab flex-1 flex flex-col items-center gap-1 py-3 transition-all">
            <iconify-icon icon="mdi:music-note" width="22"></iconify-icon>
            <span class="text-xs font-medium">Songs</span>
          </button>
          <button onclick="showView('setlists')" id="navSetlists" class="nav-tab flex-1 flex flex-col items-center gap-1 py-3 transition-all">
            <iconify-icon icon="mdi:playlist-music" width="22"></iconify-icon>
            <span class="text-xs font-medium">Setlist</span>
          </button>
          ${showUsers ? `<button onclick="showView('users')" id="navUsers" class="nav-tab flex-1 flex flex-col items-center gap-1 py-3 transition-all">
            <iconify-icon icon="mdi:account-group" width="22"></iconify-icon>
            <span class="text-xs font-medium">Users</span>
          </button>` : ''}
        </div>`;
      updateNavActive();
    }

    function updateNavActive() {
      document.querySelectorAll('.nav-tab').forEach(tab => {
        tab.style.color = 'var(--subtext)';
      });
      const map = { songs: 'navSongs', setlists: 'navSetlists', users: 'navUsers', profile: null, theme: null, roles: null };
      const id = map[currentView];
      if (id) {
        const el = document.getElementById(id);
        if (el) el.style.color = 'var(--primary)';
      }
    }

    // ─── FAB ───────────────────────────────────────────────────────────────────
    function updateFab() {
      const fab = document.getElementById('fab');
      if ((isAdmin(userProfile) || isSubAdmin(userProfile)) && (currentView === 'songs' || currentView === 'setlists')) {
        fab.classList.remove('hidden');
        fab.onclick = () => {
          if (currentView === 'songs') showAddSongModal();
          else if (currentView === 'setlists') showCreateSetlistModal();
        };
      } else {
        fab.classList.add('hidden');
      }
    }

    // ─── View Router ───────────────────────────────────────────────────────────
    function showView(view) {
      currentView = view;
      const content = document.getElementById('mainContent');
      updateNavActive();
      updateFab();

      const showHome = ['profile','theme','roles','song-detail','setlist-detail'].includes(view) ||
        activeSong || activeSetlist;
      document.getElementById('homeBtn').classList.toggle('hidden', !showHome);

      switch(view) {
        case 'songs': renderSongList(); break;
        case 'setlists': renderSetlistList(); break;
        case 'users': renderUsersView(); break;
        case 'profile': renderProfileView(); break;
        case 'theme': renderThemePanel(); break;
        case 'roles': renderRolesPanel(); break;
        case 'song-detail': renderSongDetail(); break;
        case 'setlist-detail': renderSetlistDetail(); break;
        default: renderSongList();
      }
    }

    // ─── Songs Subscription ────────────────────────────────────────────────────
    function subscribeToSongs() {
      if (songsUnsubscribe) songsUnsubscribe();
      const q = query(collection(db, 'songs'), orderBy('createdAt', 'desc'));
      songsUnsubscribe = onSnapshot(q, snap => {
        allSongs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        filteredSongs = [...allSongs];
        if (currentView === 'songs') renderSongList();
        if (currentView === 'song-detail' && activeSong) {
          const updated = allSongs.find(s => s.id === activeSong.id);
          if (updated) activeSong = updated;
        }
      });
    }

    // ─── Song List View ─────────────────────────────────────────────────────────
    function renderSongList() {
      const content = document.getElementById('mainContent');
      const canAdd = canCreateSong(userProfile);
      content.innerHTML = `
        <div class="p-4 space-y-4">
          <div class="flex items-center gap-2">
            <div class="flex-1 relative">
              <iconify-icon icon="mdi:magnify" width="18" class="absolute left-3 top-1/2 -translate-y-1/2" style="color:var(--subtext);"></iconify-icon>
              <input type="text" id="songSearch" placeholder="Search songs..." oninput="filterSongs(this.value)"
                class="w-full pl-9 pr-4 py-2.5 rounded-xl text-sm outline-none border"
                style="background:var(--input);color:var(--text);border-color:var(--border);" />
            </div>
            ${canAdd ? `<button onclick="showAddSongModal()" class="p-2.5 rounded-xl" style="background:var(--primary);color:var(--primary-text);">
              <iconify-icon icon="mdi:plus" width="20"></iconify-icon>
            </button>` : ''}
          </div>
          <div id="songGrid" class="space-y-3"></div>
        </div>`;
      renderSongGrid();
    }

    window.filterSongs = function(q) {
      filteredSongs = allSongs.filter(s =>
        s.title.toLowerCase().includes(q.toLowerCase()) ||
        s.artist.toLowerCase().includes(q.toLowerCase())
      );
      renderSongGrid();
    };

    function renderSongGrid() {
      const grid = document.getElementById('songGrid');
      if (!grid) return;
      if (filteredSongs.length === 0) {
        grid.innerHTML = `<div class="text-center py-16 opacity-50">
          <iconify-icon icon="mdi:music-off" width="48" style="color:var(--subtext);"></iconify-icon>
          <p class="mt-2 text-sm" style="color:var(--subtext);">No songs found</p>
        </div>`;
        return;
      }
      grid.innerHTML = filteredSongs.map((song, idx) => `
        <div onclick="openSong('${song.id}')" class="flex items-center gap-4 p-4 rounded-2xl cursor-pointer transition-all hover:opacity-90 border"
          style="background:var(--card);border-color:var(--border);">
          <div class="w-11 h-11 rounded-xl flex items-center justify-center flex-shrink-0" style="background:var(--primary);">
            <iconify-icon icon="mdi:music-note" width="22" style="color:var(--primary-text);"></iconify-icon>
          </div>
          <div class="flex-1 min-w-0">
            <p class="font-semibold text-sm truncate" style="color:var(--text);">${escapeHtml(song.title)}</p>
            <p class="text-xs truncate mt-0.5" style="color:var(--subtext);">${escapeHtml(song.artist)}</p>
          </div>
          <div class="flex items-center gap-2">
            <span class="text-xs px-2 py-0.5 rounded-full font-mono" style="background:var(--surface);color:var(--chord);">
              ${song.key || '?'}
            </span>
            ${canDeleteSong(userProfile) ? `<button onclick="event.stopPropagation();confirmDeleteSong('${song.id}')" class="p-1.5 rounded-lg" style="background:var(--surface);">
              <iconify-icon icon="mdi:trash-can-outline" width="16" style="color:#ef4444;"></iconify-icon>
            </button>` : ''}
          </div>
        </div>`).join('');
    }

    window.openSong = function(songId) {
      activeSong = allSongs.find(s => s.id === songId);
      if (!activeSong) return;
      currentSongIndex = filteredSongs.findIndex(s => s.id === songId);
      localTransposeSteps = 0;
      lyricsOnlyMode = lyricsOnly(userProfile);
      showView('song-detail');
      checkShowTutorial();
    };

    window.confirmDeleteSong = async function(songId) {
      if (!confirm('Delete this song permanently?')) return;
      await deleteDoc(doc(db, 'songs', songId));
      showToast('Song deleted', 'success');
    };

    // ─── Tutorial Modal ─────────────────────────────────────────────────────────
    async function checkShowTutorial() {
      if (!userProfile || userProfile.showTutorial === false) return;
      showTutorialModal();
    }

    function showTutorialModal() {
      const modal = document.createElement('div');
      modal.id = 'tutorialModal';
      modal.className = 'fixed inset-0 z-50 flex items-center justify-center p-4';
      modal.style.background = 'rgba(0,0,0,0.75)';
      modal.innerHTML = `
        <div class="w-full max-w-sm rounded-2xl p-6 space-y-5" style="background:var(--surface);border:1px solid var(--border);">
          <div class="flex items-center justify-between">
            <h2 class="text-lg font-bold" style="color:var(--text);">How to Navigate</h2>
            <button onclick="closeTutorial(false)" class="p-1.5 rounded-lg" style="background:var(--input);">
              <iconify-icon icon="mdi:close" width="18" style="color:var(--subtext);"></iconify-icon>
            </button>
          </div>
          <div class="space-y-4">
            <div class="p-3 rounded-xl border" style="background:var(--card);border-color:var(--border);">
              <div class="flex items-center gap-2 mb-2">
                <iconify-icon icon="mdi:cellphone" width="20" style="color:var(--chord);"></iconify-icon>
                <span class="text-sm font-semibold" style="color:var(--text);">Mobile & Tablet</span>
              </div>
              <p class="text-xs" style="color:var(--subtext);">Use <strong>pinch-to-zoom</strong> with two fingers to increase or decrease text size. Spread fingers apart to zoom in, pinch together to zoom out. Swipe left/right to go to next/previous song.</p>
            </div>
            <div class="p-3 rounded-xl border" style="background:var(--card);border-color:var(--border);">
              <div class="flex items-center gap-2 mb-2">
                <iconify-icon icon="mdi:monitor" width="20" style="color:var(--chord);"></iconify-icon>
                <span class="text-sm font-semibold" style="color:var(--text);">Desktop</span>
              </div>
              <p class="text-xs" style="color:var(--subtext);">Use the <strong>A-</strong> button to decrease text size and <strong>A+</strong> to increase it. Content wraps within the max-width boundary.</p>
            </div>
          </div>
          <label class="flex items-center gap-3 cursor-pointer p-3 rounded-xl border" style="border-color:var(--border);background:var(--input);">
            <input type="checkbox" id="dontShowTutorial" class="w-4 h-4 accent-purple-500" />
            <span class="text-sm" style="color:var(--text);">Don't show this again</span>
          </label>
          <button onclick="closeTutorial(true)" class="w-full py-2.5 rounded-xl font-bold text-sm" style="background:var(--primary);color:var(--primary-text);">
            Got it!
          </button>
        </div>`;
      document.body.appendChild(modal);
    }

    window.closeTutorial = async function(fromButton) {
      const dontShow = document.getElementById('dontShowTutorial')?.checked;
      document.getElementById('tutorialModal')?.remove();
      if (dontShow) {
        await updateDoc(doc(db, 'users', currentUser.uid), { showTutorial: false });
        userProfile.showTutorial = false;
      }
    };

    // ─── Song Detail View ───────────────────────────────────────────────────────
    function renderSongDetail() {
      if (!activeSong) { showView('songs'); return; }
      document.getElementById('homeBtn').classList.remove('hidden');
      const content = document.getElementById('mainContent');
      const currentKey = KEYS[(KEYS.indexOf(activeSong.originalKey || activeSong.key || 'G') + localTransposeSteps + 12) % 12];
      const originalKey = activeSong.originalKey || activeSong.key || 'G';
      const capo = getCapoSuggestion(originalKey, currentKey);
      const showLyricsToggle = isMusician(userProfile) || (userProfile?.role === 'musician');

      content.innerHTML = `
        <div id="songDetailRoot" class="flex flex-col min-h-full">
          <div class="p-4 space-y-3 border-b" style="border-color:var(--border);background:var(--surface);">
            <div class="flex items-start justify-between gap-3">
              <div class="flex-1 min-w-0">
                <h1 class="text-xl font-bold leading-tight" style="color:var(--text);">${escapeHtml(activeSong.title)}</h1>
                <p class="text-sm mt-0.5" style="color:var(--subtext);">${escapeHtml(activeSong.artist)}</p>
              </div>
              <div class="flex-shrink-0 flex flex-col items-end gap-1">
                ${activeSong.createdByPhoto ? `<img src="${activeSong.createdByPhoto}" class="w-9 h-9 rounded-full border-2" style="border-color:var(--primary);" />` :
                  `<div class="w-9 h-9 rounded-full flex items-center justify-center text-white text-sm font-bold" style="background:var(--primary);">${(activeSong.createdByName||'?')[0]}</div>`}
                <span class="text-xs" style="color:var(--subtext);">${escapeHtml(activeSong.createdByName||'')}</span>
              </div>
            </div>
            <div class="flex flex-wrap items-center gap-2">
              <div class="relative">
                <button onclick="toggleKeyDropdown()" id="keyBadge"
                  class="flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold border"
                  style="background:var(--card);color:var(--chord);border-color:var(--border);">
                  <iconify-icon icon="mdi:music-clef-treble" width="14"></iconify-icon>
                  Key: ${currentKey}
                  <iconify-icon icon="mdi:chevron-down" width="14"></iconify-icon>
                </button>
                <div id="keyDropdown" class="hidden absolute left-0 z-30 mt-1 rounded-xl shadow-xl overflow-y-auto"
                  style="background:var(--surface);border:1px solid var(--border);max-height:220px;width:180px;">
                  <div class="p-2 grid grid-cols-3 gap-1">
                    ${KEYS.map(k => `<button onclick="selectKey('${k}')" class="py-1.5 rounded-lg text-xs font-mono font-bold transition-all hover:opacity-80"
                      style="background:${k===currentKey?'var(--primary)':'var(--card)'};color:${k===currentKey?'var(--primary-text)':'var(--text)'};">${k}</button>`).join('')}
                  </div>
                </div>
              </div>
              ${capo ? `<span class="text-xs px-2 py-1 rounded-full" style="background:var(--card);color:var(--subtext);">
                <iconify-icon icon="mdi:guitar-acoustic" width="12" class="mr-1"></iconify-icon>${capo}
              </span>` : ''}
              ${showLyricsToggle ? `<button onclick="toggleLyricsOnly()" id="lyricsOnlyBtn"
                class="flex items-center gap-1 text-xs px-2 py-1 rounded-full border transition-all"
                style="background:${lyricsOnlyMode?'var(--primary)':'var(--card)'};color:${lyricsOnlyMode?'var(--primary-text)':'var(--subtext)'};border-color:var(--border);">
                <iconify-icon icon="${lyricsOnlyMode?'mdi:eye-off':'mdi:eye'}" width="14"></iconify-icon>
                ${lyricsOnlyMode ? 'Show Chords' : 'Show Lyrics Only'}
              </button>` : ''}
            </div>
            <div class="flex items-center gap-2 flex-wrap">
              <button onclick="changeFontSize(-2)" class="px-3 py-1 rounded-lg text-xs font-bold border" style="background:var(--card);color:var(--text);border-color:var(--border);">A-</button>
              <button onclick="changeFontSize(2)" class="px-3 py-1 rounded-lg text-xs font-bold border" style="background:var(--card);color:var(--text);border-color:var(--border);">A+</button>
              <button onclick="transposeUp()" class="px-3 py-1 rounded-lg text-xs font-bold border" style="background:var(--card);color:var(--chord);border-color:var(--border);">+½</button>
              <button onclick="transposeDown()" class="px-3 py-1 rounded-lg text-xs font-bold border" style="background:var(--card);color:var(--chord);border-color:var(--border);">-½</button>
              <button onclick="resetTranspose()" class="px-2 py-1 rounded-lg text-xs border" style="background:var(--card);color:var(--subtext);border-color:var(--border);">Reset</button>
              <div class="flex items-center gap-2 ml-auto">
                <iconify-icon icon="mdi:speedometer-slow" width="16" style="color:var(--subtext);"></iconify-icon>
                <input type="range" min="5" max="100" value="${autoScrollSpeed}" oninput="setScrollSpeed(this.value)"
                  class="w-20 accent-purple-500" />
                <button onclick="toggleAutoScroll()" id="autoScrollBtn"
                  class="flex items-center gap-1 px-2 py-1 rounded-lg text-xs border transition-all"
                  style="background:var(--card);color:var(--subtext);border-color:var(--border);">
                  <iconify-icon icon="mdi:play" width="14"></iconify-icon>Auto
                </button>
              </div>
            </div>
          </div>
          <div id="sheetContent" class="flex-1 p-4 overflow-auto" style="font-size:${fontSize}px;">
            ${parseChordSheet(activeSong.content, localTransposeSteps, lyricsOnlyMode || lyricsOnly(userProfile))}
          </div>
        </div>`;

      // Swipe support
      setupSwipe(document.getElementById('songDetailRoot'));
      adjustKeyDropdownPosition();
    }

    function adjustKeyDropdownPosition() {
      const badge = document.getElementById('keyBadge');
      const dropdown = document.getElementById('keyDropdown');
      if (!badge || !dropdown) return;
      const rect = badge.getBoundingClientRect();
      if (rect.bottom + 250 > window.innerHeight) {
        dropdown.style.top = 'auto';
        dropdown.style.bottom = '100%';
      } else {
        dropdown.style.top = '100%';
        dropdown.style.bottom = 'auto';
      }
    }

    window.toggleKeyDropdown = function() {
      const dd = document.getElementById('keyDropdown');
      if (!dd) return;
      dd.classList.toggle('hidden');
      if (!dd.classList.contains('hidden')) adjustKeyDropdownPosition();
    };

    window.selectKey = function(key) {
      const originalKey = activeSong?.originalKey || activeSong?.key || 'G';
      const oIdx = KEYS.indexOf(originalKey);
      const tIdx = KEYS.indexOf(key);
      localTransposeSteps = (tIdx - oIdx + 12) % 12;
      document.getElementById('keyDropdown')?.classList.add('hidden');
      renderSongDetail();
    };

    window.transposeUp = function() { localTransposeSteps = (localTransposeSteps + 1) % 12; renderSongDetail(); };
    window.transposeDown = function() { localTransposeSteps = (localTransposeSteps - 1 + 12) % 12; renderSongDetail(); };
    window.resetTranspose = function() { localTransposeSteps = 0; renderSongDetail(); };

    window.toggleLyricsOnly = function() {
      lyricsOnlyMode = !lyricsOnlyMode;
      renderSongDetail();
    };

    window.changeFontSize = function(delta) {
      fontSize = Math.max(12, Math.min(32, fontSize + delta));
      const sheet = document.getElementById('sheetContent');
      if (sheet) sheet.style.fontSize = fontSize + 'px';
    };

    window.setScrollSpeed = function(val) { autoScrollSpeed = parseInt(val); };

    window.toggleAutoScroll = function() {
      if (autoScrollInterval) {
        stopAutoScroll();
      } else {
        startAutoScroll();
      }
    };

    function startAutoScroll() {
      const sheet = document.getElementById('sheetContent');
      if (!sheet) return;
      const btn = document.getElementById('autoScrollBtn');
      if (btn) { btn.style.background = 'var(--primary)'; btn.style.color = 'var(--primary-text)'; }
      autoScrollInterval = setInterval(() => {
        sheet.scrollTop += 1;
        if (sheet.scrollTop + sheet.clientHeight >= sheet.scrollHeight) stopAutoScroll();
      }, Math.max(10, 110 - autoScrollSpeed));
    }

    function stopAutoScroll() {
      if (autoScrollInterval) {
        clearInterval(autoScrollInterval);
        autoScrollInterval = null;
      }
      const btn = document.getElementById('autoScrollBtn');
      if (btn) { btn.style.background = 'var(--card)'; btn.style.color = 'var(--subtext)'; }
    }

    // ─── Swipe Navigation ──────────────────────────────────────────────────────
    function setupSwipe(el) {
      if (!el) return;
      el.addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].clientX;
        touchStartY = e.changedTouches[0].clientY;
        swipeInProgress = true;
      }, { passive: true });
      el.addEventListener('touchend', e => {
        if (!swipeInProgress) return;
        swipeInProgress = false;
        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;
        if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)) {
          if (dx < 0) navigateSong(1);
          else navigateSong(-1);
        }
      }, { passive: true });
    }

    function navigateSong(dir) {
      const newIdx = currentSongIndex + dir;
      if (newIdx < 0 || newIdx >= filteredSongs.length) return;
      currentSongIndex = newIdx;
      activeSong = filteredSongs[currentSongIndex];
      localTransposeSteps = 0;
      renderSongDetail();
      showToast(`${activeSong.title}`, 'info');
    }

            <div id="filePreview" class="hidden">
              <label class="text-xs font-semibold mb-1 block" style="color:var(--subtext);">File Content Preview</label>
              <textarea id="fileContent" rows="8" class="w-full px-3 py-2.5 rounded-xl text-sm outline-none border font-mono resize-y"
                style="background:var(--input);color:var(--text);border-color:var(--border);"></textarea>
              <button onclick="useFileContent()" class="mt-2 w-full py-2 rounded-xl text-sm font-bold" style="background:var(--primary);color:var(--primary-text);">
                Use This Content
              </button>
            </div>
          </div>`;
      } else if (idx === 3) {
        tabContent.innerHTML = `
          <div class="space-y-3">
            <p class="text-sm font-semibold" style="color:var(--text);">Intelligent Text Extractor</p>
            <p class="text-xs" style="color:var(--subtext);">Paste raw text below. The parser will attempt to detect chords and structure automatically.</p>
            <textarea id="rawTextInput" rows="10" placeholder="Paste raw chord sheet text here..."
              class="w-full px-3 py-2.5 rounded-xl text-sm outline-none border font-mono resize-y"
              style="background:var(--input);color:var(--text);border-color:var(--border);"></textarea>
            <button onclick="parseRawText()" class="w-full py-2.5 rounded-xl font-bold text-sm" style="background:var(--primary);color:var(--primary-text);">
              <iconify-icon icon="mdi:auto-fix" width="16" class="mr-1"></iconify-icon>Parse & Extract
            </button>
            <div id="parsedPreview" class="hidden">
              <label class="text-xs font-semibold mb-1 block" style="color:var(--subtext);">Parsed Result</label>
              <textarea id="parsedContent" rows="8" class="w-full px-3 py-2.5 rounded-xl text-sm outline-none border font-mono resize-y"
                style="background:var(--input);color:var(--text);border-color:var(--border);"></textarea>
              <button onclick="useParsedContent()" class="mt-2 w-full py-2 rounded-xl text-sm font-bold" style="background:var(--primary);color:var(--primary-text);">
                Use Parsed Text
              </button>
            </div>
          </div>`;
      }
    };

    let ocrStream = null;
    window.startOCRCamera = async function() {
      try {
        ocrStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        const video = document.getElementById('ocrVideo');
        if (video) { video.srcObject = ocrStream; video.play(); }
      } catch(e) {
        showToast('Camera access denied or unavailable', 'error');
      }
    };

    window.captureOCRFrame = function() {
      const video = document.getElementById('ocrVideo');
      const canvas = document.getElementById('ocrCanvas');
      if (!video || !canvas) return;
      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0);
      const result = document.getElementById('ocrResult');
      const extracted = document.getElementById('ocrExtracted');
      if (result && extracted) {
        result.classList.remove('hidden');
        extracted.value = '[Extracted chord text would appear here after OCR processing]\n[Verse 1]\nG    C    G\nSample lyric line';
        showToast('Frame captured! Edit the extracted text as needed.', 'info');
      }
      if (ocrStream) { ocrStream.getTracks().forEach(t => t.stop()); ocrStream = null; }
    };

    window.useOCRText = function() {
      const text = document.getElementById('ocrExtracted')?.value || '';
      switchAddSongTab(0);
      setTimeout(() => {
        const ta = document.getElementById('newSongContent');
        if (ta) ta.value = text;
      }, 100);
    };

    window.handleFileDrop = function(e) {
      e.preventDefault();
      document.getElementById('fileDropZone').style.borderColor = 'var(--border)';
      const file = e.dataTransfer.files[0];
      if (file) handleFileSelect(file);
    };

    window.handleFileSelect = function(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        const preview = document.getElementById('filePreview');
        const content = document.getElementById('fileContent');
        if (preview && content) {
          preview.classList.remove('hidden');
          content.value = e.target.result;
        }
      };
      reader.readAsText(file);
    };

    window.useFileContent = function() {
      const text = document.getElementById('fileContent')?.value || '';
      switchAddSongTab(0);
      setTimeout(() => {
        const ta = document.getElementById('newSongContent');
        if (ta) ta.value = text;
      }, 100);
    };

    window.parseRawText = function() {
      const raw = document.getElementById('rawTextInput')?.value || '';
      if (!raw.trim()) { showToast('Paste some text first', 'warning'); return; }
      // Intelligent detection: identify chord lines vs lyric lines
      const lines = raw.split('\n');
      let parsed = '';
      const sectionWords = /^(verse|chorus|bridge|pre-chorus|intro|outro|tag|interlude)/i;
      lines.forEach(line => {
        const trimmed = line.trim();
        if (!trimmed) { parsed += '\n'; return; }
        if (sectionWords.test(trimmed)) {
          parsed += `[${trimmed}]\n`;
        } else {
          parsed += trimmed + '\n';
        }
      });
      const preview = document.getElementById('parsedPreview');
      const content = document.getElementById('parsedContent');
      if (preview && content) {
        preview.classList.remove('hidden');
        content.value = parsed.trim();
      }
    };

    window.useParsedContent = function() {
      const text = document.getElementById('parsedContent')?.value || '';
      switchAddSongTab(0);
      setTimeout(() => {
        const ta = document.getElementById('newSongContent');
        if (ta) ta.value = text;
      }, 100);
    };

    window.submitNewSong = async function() {
      const title = document.getElementById('newSongTitle')?.value?.trim();
      const artist = document.getElementById('newSongArtist')?.value?.trim();
      const key = document.getElementById('newSongKey')?.value || 'G';
      const originalKey = document.getElementById('newSongOrigKey')?.value || key;
      const content = document.getElementById('newSongContent')?.value?.trim();
      if (!title) { showToast('Song title is required', 'warning'); return; }
      await addDoc(collection(db, 'songs'), {
        title, artist: artist || '', key, originalKey,
        content: content || '',
        createdBy: userProfile.uid,
        createdByName: userProfile.displayName || '',
        createdByPhoto: userProfile.photoURL || '',
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      });
      document.getElementById('addSongModal')?.remove();
      showToast('Song added!', 'success');
    };

    // ─── Toast Notification ─────────────────────────────────────────────────────
    function showToast(msg, type = 'info') {
      const colors = { success:'#059669', error:'#dc2626', warning:'#d97706', info:themeConfig.primary };
      const toast = document.createElement('div');
      toast.className = 'fixed top-4 right-4 z-50 flex items-center gap-2 px-4 py-3 rounded-xl shadow-xl max-w-xs text-sm font-medium';
      toast.style.background = colors[type] || colors.info;
      toast.style.color = contrastColor(colors[type] || themeConfig.primary);
      toast.style.transform = 'translateX(120%)';
      toast.style.transition = 'transform 0.3s ease';
      toast.innerHTML = `<span>${escapeHtml(msg)}</span><button onclick="this.parentElement.remove()" class="ml-2 flex-shrink-0 opacity-75">
        <iconify-icon icon="mdi:close" width="16"></iconify-icon>
      </button>`;
      document.body.appendChild(toast);
      requestAnimationFrame(() => { toast.style.transform = 'translateX(0)'; });
      setTimeout(() => { toast.style.transform = 'translateX(120%)'; setTimeout(() => toast.remove(), 300); }, 3500);
    }

    // ─── Close dropdowns on outside click ──────────────────────────────────────
    document.addEventListener('click', e => {
      const dd = document.getElementById('keyDropdown');
      if (dd && !dd.contains(e.target) && e.target.id !== 'keyBadge' && !e.target.closest('#keyBadge')) {
        dd.classList.add('hidden');
      }
    });

    // Initialize theme
    applyTheme(themeConfig);
    updateInstallButton();
  </script>

  <style>
    :root {
      --bg: #0b0f19;
      --surface: #1a1f2e;
      --text: #ffffff;
      --subtext: #94a3b8;
      --primary: #4338ca;
      --chord: #fbbf24;
      --border: #2d3748;
      --card: #1e2535;
      --input: #252d3d;
      --primary-text: #ffffff;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100%;
      overflow: hidden;
    }

    #mainApp {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    #topBar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      padding-top: max(12px, env(safe-area-inset-top));
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 20;
    }

    #mainContent {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      max-width: 768px;
      width: 100%;
      margin: 0 auto;
    }

    #bottomNav {
      flex-shrink: 0;
      padding-bottom: env(safe-area-inset-bottom);
    }

    #fab {
      position: fixed;
      bottom: calc(72px + env(safe-area-inset-bottom) + 16px);
      right: 20px;
      z-index: 30;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--primary);
      color: var(--primary-text);
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
      cursor: pointer;
      border: none;
      font-size: 28px;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    #fab:active { transform: scale(0.93); }

    .nav-tab { transition: color 0.2s ease; }

    .section-marker { font-size: 0.65rem; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    input[type="color"] { -webkit-appearance: none; border: none; }
    input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    input[type="color"]::-webkit-color-swatch { border: none; border-radius: 6px; }

    @media (min-width: 768px) {
      #mainContent { border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
    }

    #songDetailRoot { touch-action: pan-y; }

    .auth-view-wrap {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

  <!-- ─── Auth View ────────────────────────────────────────────────── -->
  <div id="authView" class="auth-view-wrap p-4" style="background:var(--bg);">
    <div class="w-full max-w-sm space-y-6 text-center">
      <div id="authLogoContainer" class="flex justify-center">
        <iconify-icon icon="mdi:guitar-acoustic" width="96" class="text-purple-400"></iconify-icon>
      </div>
      <div class="space-y-1">
        <h1 class="text-3xl font-bold app-name-label" style="color:var(--text);">GigBook</h1>
        <p class="text-sm" style="color:var(--subtext);">Guitar Chords, Lyrics & Setlists</p>
      </div>
      <div class="space-y-3">
        <button onclick="signInWithGoogle()"
          class="w-full flex items-center justify-center gap-3 px-5 py-3.5 rounded-2xl font-bold text-sm transition-all hover:opacity-90"
          style="background:var(--primary);color:var(--primary-text);">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Sign In with Google
        </button>
        <button id="installBtn"
          class="w-full flex items-center justify-center gap-3 px-5 py-3.5 rounded-2xl font-bold text-sm border transition-all hover:opacity-80"
          style="border-color:var(--border);color:var(--text);background:var(--surface);display:none;">
          <iconify-icon icon="mdi:download" width="18"></iconify-icon>
          Install App
        </button>
      </div>
      <p class="text-xs" style="color:var(--subtext);">Sign in to access your chord sheets and setlists</p>
    </div>
  </div>

  <!-- ─── Onboarding View ──────────────────────────────────────────── -->
  <div id="onboardingView" class="hidden" style="background:var(--bg);min-height:100vh;min-height:100dvh;overflow-y:auto;"></div>

  <!-- ─── Main App Shell ───────────────────────────────────────────── -->
  <div id="mainApp" class="hidden" style="background:var(--bg);">
    <!-- Top Bar -->
    <div id="topBar"></div>
    <!-- Main Content -->
    <div id="mainContent"></div>
    <!-- Bottom Nav -->
    <div id="bottomNav"></div>
    <!-- FAB -->
    <button id="fab" class="hidden" aria-label="Add New">
      <iconify-icon icon="mdi:plus" width="28"></iconify-icon>
    </button>
  </div>

</body>
</html>
